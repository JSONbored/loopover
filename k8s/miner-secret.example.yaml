# Secret template for gittensory-miner fleet workers (#5181).
#
# Copy this file, fill in REAL values, and apply it BEFORE the StatefulSet:
#   cp k8s/miner-secret.example.yaml k8s/miner-secret.yaml   # then edit
#   kubectl apply -f k8s/miner-secret.yaml
# Do NOT commit the filled-in copy. `stringData` takes raw (unencoded) values; Kubernetes base64-encodes them.
apiVersion: v1
kind: Secret
metadata:
  name: gittensory-miner-secrets
  labels:
    app.kubernetes.io/name: gittensory-miner
type: Opaque
stringData:
  # Required: a GitHub token the miner uses to read issues and open PRs.
  GITHUB_TOKEN: "replace-with-a-real-github-token"
  # Optional: only needed for the coding-agent providers you enable (claude-cli / codex-cli / agent-sdk).
  # Leave a placeholder or delete the line for any provider you do not use.
  ANTHROPIC_API_KEY: "replace-with-anthropic-api-key-or-remove"
  OPENAI_API_KEY: "replace-with-openai-api-key-or-remove"
