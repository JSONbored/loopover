# One-command self-host for gittensory (#980):  docker compose up --build
#
# SECRETS: never baked into the image. Copy .env.example -> .env and fill it in (the file is gitignored).
# AI is OPTIONAL — without it the review path degrades gracefully (no AI summaries); enable Ollama (below)
# or set an OpenAI-compatible / subscription provider in .env to turn it on. The SQLite DB + all 56 schema
# migrations live on the `gittensory-data` volume and are applied automatically at startup.
services:
  gittensory:
    build:
      context: .
    ports:
      - "8787:8787"
    env_file:
      # SAMPLE config — `cp .env.example .env` first, then fill in your GitHub App + tokens.
      - path: .env
        required: false
    environment:
      PORT: "8787"
      DATABASE_PATH: /data/gittensory.sqlite
      # Point at the Ollama service below to enable local AI review (uncomment the ollama service too):
      # AI_PROVIDER: ollama
      # AI_BASE_URL: http://ollama:11434/v1
    volumes:
      - gittensory-data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  # Optional local AI backend. Uncomment + set AI_PROVIDER=ollama / AI_BASE_URL above, then once up:
  #   docker compose exec ollama ollama pull <your-chat-model>
  # ollama:
  #   image: ollama/ollama:latest
  #   volumes:
  #     - ollama-models:/root/.ollama

  # Optional: continuous SQLite backup to S3/B2/MinIO/R2 via Litestream (https://litestream.io).
  # Copy litestream.yml.example -> litestream.yml, fill in your bucket, then uncomment:
  # litestream:
  #   image: litestream/litestream:latest
  #   command: replicate
  #   restart: unless-stopped
  #   depends_on: [gittensory]
  #   volumes:
  #     - gittensory-data:/data
  #     - ./litestream.yml:/etc/litestream.yml:ro
  #   environment:
  #     LITESTREAM_ACCESS_KEY_ID: ${LITESTREAM_ACCESS_KEY_ID}
  #     LITESTREAM_SECRET_ACCESS_KEY: ${LITESTREAM_SECRET_ACCESS_KEY}
  #     LITESTREAM_ENDPOINT: ${LITESTREAM_ENDPOINT}
  #     LITESTREAM_REGION: ${LITESTREAM_REGION}

volumes:
  gittensory-data:
  # ollama-models:
