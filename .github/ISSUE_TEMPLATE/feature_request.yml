name: Feature request
description: Suggest a backend signal, API, MCP, GitHub App, or operational improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What contributor, maintainer, or repo-owner problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the backend behavior, signal, or API shape.
    validations:
      required: true
  - type: textarea
    id: test_scenarios
    attributes:
      label: Test scenarios
      description: List unit/integration cases for new branches, fallback paths, sanitizer rules, and regressions. Call out public/private safety boundaries if GitHub comments or MCP output changes.
    validations:
      required: true
  - type: checkboxes
    id: boundaries
    attributes:
      label: Boundaries
      options:
        - label: This is backend-only.
        - label: This does not require storing user PATs.
        - label: This does not expose wallet details, raw trust scores, or private rankings publicly.
        - label: This does not auto-close, auto-merge, rewrite contributor work, or label PRs outside the confirmed-miner policy.
        - label: Public GitHub output will be tested against forbidden language (wallet, hotkey, raw trust score, payout, reward estimate, farming, private reviewability, public score estimate).
